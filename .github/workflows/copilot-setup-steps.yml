  ]);

  useEffect(() => {
    const session = getSession();
    if (session && currentPath === "/") setCurrentPath("/home");
    else if (!session && currentPath !== "/") setCurrentPath("/");
  }, [currentPath]);

  const appState: AppState = {
    integrations,
    alerts,
    toggleIntegration: (id) => {
      setIntegrations(prev => prev.map(i => i.id === id ? { ...i, status: i.status === "ACTIVE" ? "PENDING" : "ACTIVE" } : i));
    },
    resolveAlert: (id) => {
      setAlerts(prev => prev.map(a => a.id === id ? { ...a, status: "RESOLVED" } : a));
    }
  };

  const routerValue = { currentPath, navigate: setCurrentPath };

  return (
    <RouterContext.Provider value={routerValue}>
      <AppStateContext.Provider value={appState}>
        {currentPath === "/" && <LoginPage />}
        {currentPath === "/home" && <HomePage />}
        {currentPath === "/integrations" && <IntegrationsPage />}
        {currentPath === "/alerts" && <AlertsPage />}
      </AppStateContext.Provider>
    </RouterContext.Provider>
  );
}

