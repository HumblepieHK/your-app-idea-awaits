function DashboardLayout({ children }: { children: React.ReactNode }) {
  const navigate = useNavigate();
  const { currentPath } = useContext(RouterContext);
  const { alerts } = useAppState();
  const session = getSession();
  
  const flaggedCount = alerts.filter(a => a.status === "FLAGGED").length;

  const handleLogout = () => {
    setSession(null);
    navigate({ to: "/" });
  };

  const NavItem = ({ to, icon: Icon, label, badge }: { to: string; icon: any; label: string; badge?: number }) => {
    const isActive = currentPath === to;
    return (
      <button
        onClick={() => navigate({ to })}
        className={`flex w-full items-center justify-between px-4 py-3 rounded-xl text-sm font-bold transition ${
          isActive ? "bg-slate-800 text-teal-400" : "text-slate-400 hover:bg-slate-800 hover:text-white"
        }`}
      >
        <div className="flex items-center gap-3">
          <Icon className="h-4 w-4" /> {label}
        </div>
        {badge !== undefined && badge > 0 && (
          <span className="flex h-5 w-5 items-center justify-center rounded-full bg-red-500 text-[10px] text-white">
            {badge}
          </span>
        )}
      </button>
    );
  };

  return (
    <div className="min-h-screen bg-slate-950 text-slate-100 flex flex-col md:flex-row">
      <aside className="w-full md:w-64 bg-slate-900 border-b md:border-b-0 md:border-r border-slate-800 p-5 flex flex-col justify-between shrink-0">
        <div className="space-y-6">
          <div className="flex items-center gap-3 cursor-pointer" onClick={() => navigate({ to: "/home" })}>
            <div className="rounded-xl bg-teal-600 p-2 shadow-lg shadow-teal-900/20">
              <IconShieldCheck className="h-6 w-6 text-white" />
            </div>
            <div>
              <h2 className="font-black text-lg text-white leading-tight">TotonouTXM</h2>
              <span className="text-[9px] font-bold text-slate-500 tracking-widest uppercase">Compliance</span>
            </div>
          </div>

          <div className="border-t border-slate-800 my-4" />

          <nav className="space-y-2">
            <NavItem to="/home" icon={IconHome} label="Dashboard" />
            <NavItem to="/alerts" icon={IconBell} label="Alerts Queue" badge={flaggedCount} />
            <NavItem to="/integrations" icon={IconPuzzle} label="Integrations" />
          </nav>
        </div>

        <div className="pt-6 space-y-4 md:pt-0">
          <div className="p-3 bg-slate-950 rounded-2xl border border-slate-800/80">
            <p className="text-[10px] text-slate-500 font-bold uppercase tracking-wider">Officer ID</p>
            <p className="text-xs font-bold text-slate-300 truncate mt-1">{session?.userId || "Admin"}</p>
            <span className="inline-block mt-2 px-2 py-0.5 rounded bg-teal-950/80 text-[9px] font-bold text-teal-400 border border-teal-900">
              {session?.org || "Zetrov Limited"}
            </span>
          </div>

          <button onClick={handleLogout} className="flex w-full items-center justify-center gap-2 px-4 py-3 rounded-xl text-sm font-bold text-red-400 hover:bg-red-950/20 transition border border-transparent hover:border-red-900/30">
            <IconLogout className="h-4 w-4" /> Sign Out
          </button>
        </div>
      </aside>

      <main className="flex-1 overflow-y-auto bg-slate-950/50">
        <div className="max-w-6xl mx-auto p-6 md:p-10 space-y-8">
          {children}
        </div>
      </main>
    </div>
  );
}

