Here is the updated, self-contained prototype. I have implemented the suggestions by introducing a **Global State Context** to make the data interactive across screens, extracting the sidebar into a reusable **Dashboard Layout**, and building out the new **Alerts Queue** view for transaction monitoring.

### Key Upgrades:

1. **Interactive Data:** Toggling an integration on the Integrations page now updates the live statistics on the Home dashboard.
2. **Alerts Queue (New View):** A dedicated `/alerts` route where you can review and resolve mocked compliance flags (e.g., Velocity Anomalies, Name Screening hits). Resolving them clears them from the Home dashboard.
3. **Dashboard Layout:** To keep the code DRY as the app grows, the sidebar navigation has been extracted into a reusable wrapper component.

### Updated Prototype Code:

```tsx
import { useEffect, useState, createContext, useContext } from "react";

// ==========================================
// 1. ROUTING & STORAGE (Mocked for Zero-Dependency)
// ==========================================

const getSession = () => {
  if (typeof window !== "undefined") {
    try {
      const data = localStorage.getItem("totonou_session");
      return data ? JSON.parse(data) : null;
    } catch {
      return null;
    }
  }
  return null;
};

const setSession = (session: { userId: string; org: string } | null) => {
  if (typeof window !== "undefined") {
    try {
      if (session) {
        localStorage.setItem("totonou_session", JSON.stringify(session));
      } else {
        localStorage.removeItem("totonou_session");
      }
    } catch (e) {
      console.error("Local storage not accessible", e);
    }
  }
};

interface RouterContextType {
  currentPath: string;
  navigate: (to: string) => void;
}

const RouterContext = createContext<RouterContextType>({
  currentPath: "/",
  navigate: () => {},
});

export function useNavigate() {
  const { navigate } = useContext(RouterContext);
  return (options: { to: string }) => navigate(options.to);
}

// ==========================================
// 2. GLOBAL STATE (For Interactive Data)
// ==========================================

interface AppState {
  integrations: { id: string; name: string; desc: string; status: "ACTIVE" | "PENDING"; type: string }[];
  alerts: { id: string; subject: string; type: string; status: "FLAGGED" | "RESOLVED"; time: string }[];
  toggleIntegration: (id: string) => void;
  resolveAlert: (id: string) => void;
}

const AppStateContext = createContext<AppState | null>(null);

function useAppState() {
  const context = useContext(AppStateContext);
  if (!context) throw new Error("useAppState must be used within AppStateProvider");
  return context;
}

